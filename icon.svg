  <!-- 走る人シルエット（小さく） -->
  <g transform="translate(330,340) scale(0.7)" fill="#ffd700" opacity="0.8">
    <circle cx="20" cy="5" r="8"/>
    <line x1="20" y1="13" x2="14" y2="30" stroke="#ffd700" stroke-width="3"/>
    <line x1="14" y1="30" x2="5" y2="45" stroke="#ffd700" stroke-width="3"/>
    <line x1="14" y1="30" x2="24" y2="44" stroke="#ffd700" stroke-width="3"/>
    <line x1="20" y1="20" x2="8" y2="28" stroke="#ffd700" stroke-width="3"/>
    <line x1="20" y1="20" x2="32" y2="24" stroke="#ffd700" stroke-width="3"/>
  </g>
